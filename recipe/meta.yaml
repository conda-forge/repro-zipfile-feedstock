{% set name = "repro-zipfile" %}
{% set version = "0.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/repro_zipfile-{{ version }}.tar.gz
  sha256: fde4cf1300e740f2fd1745708ba8f1366a70853a39af6266e1e04ae81c1231c1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - repro_zipfile
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: A tiny, zero-dependency replacement for Python's zipfile.ZipFile for creating reproducible/deterministic ZIP archives.
  home: https://github.com/drivendataorg/repro-zipfile
  dev_url: https://github.com/drivendataorg/repro-zipfile
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jayqi
